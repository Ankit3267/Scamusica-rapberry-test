name: Build Installer (Windows)

on:
  workflow_dispatch:

env:
  PROJECT_PATH: .
  APP_VERSION: 1.0.0

jobs:
  build-windows:
    name: Build Windows EXE Installer
    runs-on: windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # ✅ BUILD FAT JAR (VERY IMPORTANT)
      - name: Build JAR (with dependencies)
        shell: bash
        run: |
          chmod +x mvnw || true
          ./mvnw -B -DskipTests clean package

          echo "📦 Target contents:"
          ls -lh target

          # pick correct jar (exclude original)
          JAR_NAME=$(ls target/Scamusica-*.jar | grep -v original | head -1 | xargs -r basename)

          echo "✅ Using JAR: $JAR_NAME"
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV

      # ✅ CREATE RUNTIME (AUTO MODULE FIX)
      - name: Create runtime (jlink)
        shell: bash
        run: |
          JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))

          jlink \
            --module-path "$JAVA_HOME/jmods" \
            --add-modules java.base,java.desktop,java.logging,java.net.http,jdk.crypto.ec \
            --output target/scamusica-runtime \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=2

      # ✅ IMPORT CERTS
      - name: Import SSL certificates
        shell: bash
        run: |
          KEYTOOL=target/scamusica-runtime/bin/keytool
          CACERTS=target/scamusica-runtime/lib/security/cacerts
          STOREPASS=changeit

          $KEYTOOL -delete -alias api1 -keystore $CACERTS -storepass $STOREPASS || true
          $KEYTOOL -delete -alias api2 -keystore $CACERTS -storepass $STOREPASS || true

          $KEYTOOL -importcert -alias api1 \
            -file "certs/api1_fullchain.crt" \
            -keystore $CACERTS -storepass $STOREPASS -noprompt

          $KEYTOOL -importcert -alias api2 \
            -file "certs/api2_fullchain.crt" \
            -keystore $CACERTS -storepass $STOREPASS -noprompt

      # ✅ PACKAGE EXE (NO MAVEN PLUGIN)
      - name: Create EXE Installer
        shell: bash
        run: |
          mkdir -p target/jpackage-input
          cp target/$JAR_NAME target/jpackage-input/

          jpackage \
            --type exe \
            --dest target \
            --name Scamusica \
            --input target/jpackage-input \
            --main-jar "$JAR_NAME" \
            --main-class com.musicplayer.scamusica.Main \
            --runtime-image target/scamusica-runtime \
            --win-menu \
            --win-shortcut \
            --win-dir-chooser \
            --win-console

          echo "📦 EXE created:"
          ls -lh target/*.exe

      # ✅ UPLOAD
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: scamusica-windows
          path: target/*.exe
