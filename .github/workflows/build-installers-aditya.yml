name: Build Installer (macOS Intel)

on:
  workflow_dispatch:

env:
  PROJECT_PATH: .
  APP_VERSION: 1.0.0

jobs:
  build-macos-intel:
    name: Build macOS Intel DMG
    runs-on: macos-15-intel   # Intel runner

    steps:

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # ✅ Build FAT JAR
      - name: Build JAR
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          chmod +x mvnw || true
          ./mvnw -B -DskipTests clean package

          echo "📦 Target contents:"
          ls -lh target

      # ✅ Detect correct JAR
      - name: Detect JAR
        run: |
          JAR_NAME=$(ls target/Scamusica-*.jar | grep -v original | head -1 | xargs basename)
          echo "Using JAR: $JAR_NAME"
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV

      # ✅ Download JavaFX SDK (Intel)
      - name: Download JavaFX SDK
        run: |
          curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_osx-x64_bin-sdk.zip
          unzip javafx.zip

      # ✅ Create runtime manually
      - name: Create runtime
        run: |
          JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          JFX_PATH=$(pwd)/javafx-sdk-21.0.2/lib

          echo "📦 Creating runtime..."

          jlink \
            --module-path "$JAVA_HOME/jmods:$JFX_PATH" \
            --add-modules java.base,java.desktop,java.logging,java.net.http,jdk.crypto.ec,jdk.crypto.cryptoki,javafx.controls,javafx.fxml,javafx.media \
            --output target/scamusica-runtime \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=2

          # ✅ CRITICAL FIX (JavaFX rendering)
          cp $JFX_PATH/*.dylib target/scamusica-runtime/lib/

          echo "🔎 Verify JavaFX libs:"
          find target/scamusica-runtime -name "libprism*"

      # ✅ Import certificates
      - name: Import SSL certificates
        run: |
          KEYTOOL=target/scamusica-runtime/bin/keytool
          CACERTS=target/scamusica-runtime/lib/security/cacerts
          STOREPASS=changeit

          echo "Cleaning old certs..."

          $KEYTOOL -delete -alias cis-root -keystore $CACERTS -storepass $STOREPASS || true
          $KEYTOOL -delete -alias new-cert-1 -keystore $CACERTS -storepass $STOREPASS || true
          $KEYTOOL -delete -alias new-cert-2 -keystore $CACERTS -storepass $STOREPASS || true

          echo "Importing certs..."

          $KEYTOOL -importcert -alias cis-root \
            -file "certs/ca 9.crt" \
            -keystore $CACERTS -storepass $STOREPASS -noprompt

          $KEYTOOL -importcert -alias new-cert-1 \
            -file "certs/ca-10.crt" \
            -keystore $CACERTS -storepass $STOREPASS -noprompt

          $KEYTOOL -importcert -alias new-cert-2 \
            -file "certs/Fortinet_CA_SSLProxy_new-7.cer" \
            -keystore $CACERTS -storepass $STOREPASS -noprompt

      # ✅ Prepare clean input
      - name: Prepare input
        run: |
          mkdir -p target/jpackage-input
          cp target/$JAR_NAME target/jpackage-input/

          echo "📦 Input contents:"
          ls -lh target/jpackage-input

      # ✅ Create DMG
      - name: Package DMG
        run: |
          jpackage \
            --type dmg \
            --dest target \
            --name Scamusica \
            --input target/jpackage-input \
            --main-jar "$JAR_NAME" \
            --main-class com.musicplayer.scamusica.Main \
            --runtime-image target/scamusica-runtime \
            --icon src/main/resources/scamusica.icns \
            --mac-package-name Scamusica \
            --mac-package-identifier com.scamusica.player \
            --java-options "-Dhttps.protocols=TLSv1.2,TLSv1.3"

          echo "📦 DMG created:"
          ls -lh target/*.dmg

      # ✅ Upload
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: scamusica-macos-intel
          path: target/*.dmg
          retention-days: 30
